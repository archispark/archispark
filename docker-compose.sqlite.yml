# ─────────────────────────────────────────────────────────────────────────────
#  ArchiSpark — SQLite (dev / déploiement léger)
#
#  Les données sont persistées dans un volume Docker.
#  Pour une base éphémère (reset au redémarrage), utiliser docker-compose.demo.yml.
#
#  À combiner avec docker-compose.yml :
#    docker compose -f docker-compose.yml -f docker-compose.sqlite.yml \
#                   -f docker-compose.traefik.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  api:
    environment:
      DATABASE_URL: file:/data/archispark.db
    volumes:
      - sqlite_data:/data

  mcp-server:
    environment:
      DATABASE_URL: file:/data/archispark.db
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
