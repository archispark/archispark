# ─────────────────────────────────────────────────────────────────────────────
#  ArchiSpark — Demo tout-en-un
#
#  Un seul conteneur : API + MCP Server + Next.js + SQLite éphémère
#  La base de données est réinitialisée à chaque redémarrage du conteneur.
#  Géré par pm2 (pm2.demo.config.cjs).
#
#  Usage :
#    docker compose -f docker-compose.demo.yml up -d
#    docker compose -f docker-compose.demo.yml up -d --build   # forcer le rebuild
#
#  Accès : http://localhost:8000
#  Identifiants : admin / demo  |  user / demo
#
#  Ce fichier est autonome — ne pas le combiner avec docker-compose.yml.
# ─────────────────────────────────────────────────────────────────────────────

services:

  demo:
    build:
      context:    .
      dockerfile: Dockerfile.demo
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV:             production
      PORT:                 "8000"
      # SQLite éphémère dans /tmp (vidé à chaque redémarrage)
      DATABASE_URL:         file:/tmp/archispark.db
      ARCHIMATE_API_URL:    http://localhost:3000
      BETTER_AUTH_URL:      http://localhost:8000
      # Surcharger les secrets de démonstration si besoin
      BETTER_AUTH_SECRET:   ${BETTER_AUTH_SECRET:-archispark-demo-secret-2026}
      SEED_ADMIN_PASSWORD:  ${SEED_ADMIN_PASSWORD:-demo}
      SEED_USER_PASSWORD:   ${SEED_USER_PASSWORD:-demo}
