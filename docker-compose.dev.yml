# ─────────────────────────────────────────────────────────────────────────────
#  ArchiSpark — Dev Docker (ports exposés, sans proxy)
#
#  Utile pour tester les builds Docker localement sans Caddy ni Traefik.
#  Pour le développement avec hot-reload, préférer `pnpm dev` à la racine.
#
#  Usage (avec SQLite) :
#    docker compose -f docker-compose.yml -f docker-compose.sqlite.yml \
#                   -f docker-compose.dev.yml up -d
#
#  Accès direct :
#    API   → http://localhost:3000
#    MCP   → http://localhost:3001/mcp/
#    Web   → http://localhost:8000
# ─────────────────────────────────────────────────────────────────────────────

services:

  api:
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  mcp-server:
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development

  web:
    ports:
      - "8000:8000"
    environment:
      NODE_ENV:          development
      # Active les rewrites Next.js vers l'API (via réseau Docker interne)
      ARCHIMATE_API_URL: http://api:3000
