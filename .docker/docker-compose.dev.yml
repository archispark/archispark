# ─────────────────────────────────────────────────────────────────────────────
#  ArchiSpark — Docker Compose (dev local / pnpm)
#
#  Lance uniquement l'infrastructure (Postgres + Redis).
#  L'application tourne en local via pnpm :
#
#    make dev-infra   # démarre Postgres + Redis
#    pnpm dev         # démarre api, web et mcp-server avec hot-reload
#
#  Arrêt (en conservant les données) :
#    docker compose -f .docker/docker-compose.dev.yml down
#
#  Arrêt + suppression des volumes :
#    docker compose -f .docker/docker-compose.dev.yml down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de données ──────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     archispark
      POSTGRES_PASSWORD: ${DB_PASSWORD:-archispark}
      POSTGRES_DB:       archispark
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      # Script d'initialisation : crée archispark_tenant au premier démarrage
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U archispark -d archispark"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Cache / pub-sub ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >-
      redis-server --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test:     ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Identity (Keycloak / Phasetwo) ───────────────────────────────────────
  keycloak:
    image: quay.io/phasetwo/phasetwo-keycloak:26.0.2
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB:          postgres
      KC_DB_URL:      jdbc:postgresql://postgres:5432/archispark_keycloak
      KC_DB_USERNAME: archispark
      KC_DB_PASSWORD: ${DB_PASSWORD:-archispark}
      KC_HOSTNAME:        localhost
      KC_HOSTNAME_PORT:   "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED:    "true"
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      # Realm import: clients, roles and demo users for local dev.
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout:  5s
      retries:  30
      start_period: 30s

volumes:
  postgres_dev_data:
  redis_dev_data:
