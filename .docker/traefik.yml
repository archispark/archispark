# ─────────────────────────────────────────────────────────────────────────────
#  ArchiSpark — Traefik v3 (configuration statique)
#
#  Routage centralisé via labels Docker :
#    /api/*   → Express API   :3000  (préfixe /api retiré)
#    /auth/*  → Express API   :3000  (préfixe complet conservé)
#    /mcp/*   → MCP Server    :3001  (Streamable HTTP / SSE)
#    /*       → Next.js Web   :8000
#
#  TLS Let's Encrypt :
#    Décommentez la section certificatesResolvers, puis sur chaque routeur :
#      traefik.http.routers.<name>.entrypoints=websecure
#      traefik.http.routers.<name>.tls.certresolver=letsencrypt
# ─────────────────────────────────────────────────────────────────────────────

api:
  dashboard: false

log:
  level: INFO

accessLog: {}

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: archispark

# ── TLS Let's Encrypt (optionnel) ────────────────────────────────────────────
# 1. Décommenter le bloc ci-dessous
# 2. Renseigner ACME_EMAIL dans .env
# 3. Ajouter sur chaque routeur :
#      traefik.http.routers.<name>.entrypoints=websecure
#      traefik.http.routers.<name>.tls.certresolver=letsencrypt
# 4. Ajouter une redirection HTTP→HTTPS sur l'entryPoint web :
#      http.redirections.entryPoint.to=websecure
#      http.redirections.entryPoint.scheme=https
#
#certificatesResolvers:
#  letsencrypt:
#    acme:
#      email: "votre@email.com"
#      storage: /letsencrypt/acme.json
#      httpChallenge:
#        entryPoint: web
