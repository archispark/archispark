# ─────────────────────────────────────────────────────────────────────────────
#  ArchiSpark — PostgreSQL 17
#
#  À combiner avec docker-compose.yml :
#    docker compose -f docker-compose.yml -f docker-compose.postgres.yml \
#                   -f docker-compose.traefik.yml up -d
#
#  Variable requise dans .env :
#    DB_PASSWORD
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     archispark
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB:       archispark
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U archispark -d archispark"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - archispark

  api:
    environment:
      DATABASE_URL: postgresql://archispark:${DB_PASSWORD}@postgres:5432/archispark
    depends_on:
      postgres:
        condition: service_healthy

  mcp-server:
    environment:
      DATABASE_URL: postgresql://archispark:${DB_PASSWORD}@postgres:5432/archispark
    depends_on:
      postgres:
        condition: service_healthy

networks:
  archispark:
    name: archispark

volumes:
  postgres_data:
