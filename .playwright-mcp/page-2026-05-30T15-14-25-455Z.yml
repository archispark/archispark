  - generic [ref=e84]:
    - generic [ref=e85]: The problem
    - heading "EA tools are expensive, closed, and manual." [level=2] [ref=e86]
    - paragraph [ref=e87]: Most platforms lock your data in proprietary formats, charge per seat, and still require architects to model everything by hand. ArchiPulse takes a different path.
    - generic [ref=e88]:
      - generic [ref=e89]:
        - generic [ref=e90]: The old way
        - heading "Proprietary, expensive, and static" [level=3] [ref=e91]
        - paragraph [ref=e92]: Vendor lock-in, six-figure licenses, and architecture data you can't query or export freely. Models that live in a single tool and die when the license expires.
      - generic [ref=e93]:
        - generic [ref=e94]: ArchiPulse
        - heading "Open, relational, AI-operable" [level=3] [ref=e95]
        - paragraph [ref=e96]: AOEF mapped directly to PostgreSQL — export is a SELECT, import is an INSERT. Connect an AI agent via MCP and let it build and query models for you. Your data stays yours, forever exportable to any AOEF-compliant tool.
  - generic [ref=e98]:
    - generic [ref=e99]: Features
    - heading "Built for working architects." [level=2] [ref=e100]
    - paragraph [ref=e101]: Everything your team needs to make EA a living, queryable, collaborative practice — not a PowerPoint exercise.
    - generic [ref=e102]:
      - generic [ref=e103]:
        - generic [ref=e104]: ⌘
        - heading "AI-Native via MCP" [level=3] [ref=e105]
        - paragraph [ref=e106]: Connect Claude or any MCP-compatible agent to ArchiPulse. The AI creates workspaces, models elements and relationships, queries views, and exports AOEF — all through natural language.
      - generic [ref=e107]:
        - generic [ref=e108]: ↔
        - heading "AOEF Interoperability" [level=3] [ref=e109]
        - paragraph [ref=e110]: Import and export valid AOEF XML at any time. Full roundtrip with Archi, archimate-editor, BiZZdesign, and Sparx EA. Your models are never trapped.
      - generic [ref=e111]:
        - generic [ref=e112]: ⚙
        - heading "Collaborative Repository" [level=3] [ref=e113]
        - paragraph [ref=e114]: Multiple architects edit the same workspace simultaneously. Optimistic locking prevents silent overwrites. Conflicts shown with author and timestamp.
      - generic [ref=e115]:
        - generic [ref=e116]: ⚡
        - heading "Import Preview" [level=3] [ref=e117]
        - paragraph [ref=e118]: Upload an AOEF file and review element-by-element what would change before committing. No surprises, no accidental overwrites.
      - generic [ref=e119]:
        - generic [ref=e120]: ◈
        - heading "EAM Analytical Views" [level=3] [ref=e121]
        - paragraph [ref=e122]: Application Dashboard, Landscape Map, Capability Tree, Technology Stack, Dependency Graph — pre-defined views generated automatically from your model data.
      - generic [ref=e123]:
        - generic [ref=e124]: ⊞
        - heading "Model Editor" [level=3] [ref=e125]
        - paragraph [ref=e126]: Create and update elements and relationships directly from the web UI. No file upload required — edit your model live and see changes immediately.
