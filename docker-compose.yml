# ─────────────────────────────────────────────────────────────────────────────
#  ArchiSpark — Docker Compose (base)
#
#  Ce fichier définit les services applicatifs uniquement.
#  Il doit toujours être combiné avec :
#    • une base de données  : docker-compose.postgres.yml  |  docker-compose.sqlite.yml
#    • un reverse proxy     : docker-compose.traefik.yml   |  docker-compose.caddy.yml
#
#  Exemples :
#    # Traefik + PostgreSQL (production recommandée)
#    docker compose -f docker-compose.yml \
#                   -f docker-compose.postgres.yml \
#                   -f docker-compose.traefik.yml up -d
#
#    # Caddy + PostgreSQL
#    docker compose -f docker-compose.yml \
#                   -f docker-compose.postgres.yml \
#                   -f docker-compose.caddy.yml up -d
#
#    # Traefik + SQLite (léger)
#    docker compose -f docker-compose.yml \
#                   -f docker-compose.sqlite.yml \
#                   -f docker-compose.traefik.yml up -d
#
#    # Dev Docker (ports exposés, sans proxy)
#    docker compose -f docker-compose.yml \
#                   -f docker-compose.sqlite.yml \
#                   -f docker-compose.dev.yml up -d
#
#    # Demo tout-en-un
#    docker compose -f docker-compose.demo.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── REST API ───────────────────────────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV:            production
      PORT:                "3000"
      HOST:                "0.0.0.0"
      BETTER_AUTH_SECRET:  ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL:     ${ARCHISPARK_URL:-http://localhost}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_USER_PASSWORD:  ${SEED_USER_PASSWORD:-}
      # DATABASE_URL : ajouté par docker-compose.postgres.yml ou docker-compose.sqlite.yml
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - archispark

  # ── MCP Server ─────────────────────────────────────────────────────────────
  mcp-server:
    build:
      context:    .
      dockerfile: Dockerfile.mcp-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MCP_PORT: "3001"
      HOST:     "0.0.0.0"
      # DATABASE_URL : ajouté par docker-compose.postgres.yml ou docker-compose.sqlite.yml
    depends_on:
      api:
        condition: service_healthy
    networks:
      - archispark

  # ── Next.js Web ────────────────────────────────────────────────────────────
  web:
    build:
      context:    .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      NODE_ENV:          production
      PORT:              "8000"
      HOSTNAME:          "0.0.0.0"
      # Vide en production : le proxy gère /api/* et /auth/*
      # Défini dans docker-compose.dev.yml pour dev sans proxy
      ARCHIMATE_API_URL: ""
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:8000/"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - archispark

networks:
  archispark:
    name: archispark
