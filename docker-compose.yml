services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: archispark
      POSTGRES_PASSWORD: archispark
      POSTGRES_DB: archispark
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archispark -d archispark"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-oidc:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - "9000:8080"
    environment:
      JSON_CONFIG: |
        {
          "interactiveLogin": false,
          "httpServer": "NettyWrapper",
          "tokenCallbacks": [{
            "issuerId": "archispark",
            "requestMappings": [{
              "requestParam": "scope",
              "match": "openid",
              "claims": {
                "sub": "testuser",
                "email": "testuser@example.com",
                "name": "Test User"
              }
            }]
          }]
        }

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/repo/data
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      # DB_DRIVER: postgres                                         # uncomment to use PostgreSQL
      # DATABASE_URL: postgresql://archispark:archispark@postgres:5432/archispark
      # GENERIC_OIDC_CLIENT_ID: archispark-client                  # uncomment to enable mock SSO
      # GENERIC_OIDC_CLIENT_SECRET: secret
      # GENERIC_OIDC_ISSUER: http://mock-oidc:8080/archispark
      # GENERIC_OIDC_NAME: "Mock SSO"
    # depends_on:                                                   # uncomment when DB_DRIVER=postgres
    #   postgres:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      MCP_PORT: "3001"
      HOST: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Must match the Docker network service name
        ARCHIMATE_API_URL: http://api:3000
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

networks:
  default:
    name: archispark

volumes:
  postgres_data:
