# ─────────────────────────────────────────────────────────────────────────────
#  ArchiSpark — Docker Compose (Phase 3 — Production)
#
#  Architecture couplage faible :
#    proxy      → Traefik v3 (reverse proxy, routage via labels Docker)
#    api        → Express REST API
#    mcp-server → MCP Server (Streamable HTTP / SSE)
#    web        → Next.js (rendu UI uniquement)
#    postgres   → PostgreSQL 17
#
#  Usage :
#    cp .env.example .env && vi .env   # configurer les secrets
#    docker compose up -d
#
#  Variables requises dans .env :
#    DB_PASSWORD, BETTER_AUTH_SECRET
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  proxy:
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_certs:/letsencrypt
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      mcp-server:
        condition: service_started
    networks:
      - archispark

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     archispark
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB:       archispark
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U archispark -d archispark"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - archispark

  # ── REST API ───────────────────────────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV:             production
      PORT:                 "3000"
      HOST:                 "0.0.0.0"
      DATABASE_URL:         postgresql://archispark:${DB_PASSWORD}@postgres:5432/archispark
      BETTER_AUTH_SECRET:   ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL:      ${ARCHISPARK_URL:-http://localhost}
      SEED_ADMIN_PASSWORD:  ${SEED_ADMIN_PASSWORD:-}
      SEED_USER_PASSWORD:   ${SEED_USER_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout:  5s
      retries:  5
    labels:
      - "traefik.enable=true"
      # ── Middlewares globaux ─────────────────────────────────────────────────
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.customFrameOptionsValue=SAMEORIGIN"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Server="
      # ── Routeur /api/* → strip /api → api:3000 ──────────────────────────────
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.middlewares=strip-api,security-headers"
      - "traefik.http.routers.api.service=api"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
      # ── Routeur /auth/* → api:3000 (Better Auth, sans strip) ───────────────
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.middlewares=security-headers"
      - "traefik.http.routers.auth.service=api"
    networks:
      - archispark

  # ── MCP Server ─────────────────────────────────────────────────────────────
  mcp-server:
    build:
      context:    .
      dockerfile: Dockerfile.mcp-server
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      MCP_PORT:     "3001"
      HOST:         "0.0.0.0"
      DATABASE_URL: postgresql://archispark:${DB_PASSWORD}@postgres:5432/archispark
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # ── Routeur /mcp/* → mcp-server:3001 ────────────────────────────────────
      # Traefik ne bufférise pas les réponses par défaut → SSE/streaming natif
      - "traefik.http.routers.mcp.rule=PathPrefix(`/mcp`)"
      - "traefik.http.routers.mcp.entrypoints=web"
      - "traefik.http.routers.mcp.middlewares=security-headers"
      - "traefik.http.routers.mcp.service=mcp"
      - "traefik.http.services.mcp.loadbalancer.server.port=3001"
    networks:
      - archispark

  # ── Next.js Web ────────────────────────────────────────────────────────────
  # Responsabilité unique : rendu UI
  # Traefik gère /api/* et /auth/* — aucun rewrite dans Next.js
  web:
    build:
      context:    .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT:     "8000"
      HOSTNAME: "0.0.0.0"
      # ARCHIMATE_API_URL vide → rewrites Next.js désactivés
      ARCHIMATE_API_URL: ""
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:8000/"]
      interval: 10s
      timeout:  5s
      retries:  5
    labels:
      - "traefik.enable=true"
      # ── Routeur catch-all /* → web:8000 ─────────────────────────────────────
      # PathPrefix('/') a la priorité la plus basse (règle la plus courte)
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.middlewares=security-headers"
      - "traefik.http.routers.web.service=web"
      - "traefik.http.services.web.loadbalancer.server.port=8000"
    networks:
      - archispark

networks:
  archispark:
    name: archispark

volumes:
  postgres_data:
  traefik_certs:
