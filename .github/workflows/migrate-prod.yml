name: Run production migrations

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pending migrations
        run: pnpm --filter @workspace/db migrate:prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}

      - name: Run organization backfill
        run: pnpm --filter @workspace/db backfill:prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
