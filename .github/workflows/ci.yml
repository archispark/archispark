name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native addons
        run: pnpm --filter control-api build && pnpm --filter tenant-api build
        env:
          NODE_ENV: production

      - name: Run CI Tasks (Lint, Typecheck, Test)
        run: pnpm turbo run lint typecheck test:coverage --filter=control-api --filter=tenant-api --filter=mcp-server --filter=web
        env:
          NODE_ENV: test

      - name: Upload control-api coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-control-api
          path: apps/control-api/coverage/
          retention-days: 7

      - name: Upload tenant-api coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-tenant-api
          path: apps/tenant-api/coverage/
          retention-days: 7

      - name: control-api coverage summary
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          name: control-api
          working-directory: apps/control-api

      - name: tenant-api coverage summary
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          name: tenant-api
          working-directory: apps/tenant-api
