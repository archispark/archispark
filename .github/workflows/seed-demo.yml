name: Restore demo data

on:
  workflow_dispatch:
    inputs:
      reset:
        description: 'Delete existing ArchiMetal / ArchiSurance workspaces before seeding (required to overwrite)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  seed:
    name: Seed demo data on Neon
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @workspace/auth
        run: pnpm --filter @workspace/auth build

      - name: Delete existing demo workspaces
        if: inputs.reset == true
        # CASCADE on workspaces.id removes all child rows (elements, relationships,
        # views, nodes, connections, bendpoints, property_definitions, …).
        # workspaces lives in the tenant fallback DB after Phase 7.
        run: psql "$TENANT_DATABASE_URL_UNPOOLED" -c "DELETE FROM workspaces WHERE name IN ('ArchiMetal', 'ArchiSurance');"
        env:
          TENANT_DATABASE_URL_UNPOOLED: ${{ secrets.TENANT_DATABASE_URL_UNPOOLED }}
          PGSSLMODE: require

      - name: Seed demo data
        run: pnpm --filter @workspace/db seed:demo
        env:
          TENANT_DATABASE_URL: ${{ secrets.TENANT_DATABASE_URL_UNPOOLED }}
          KEYCLOAK_URL: ${{ secrets.KEYCLOAK_URL }}
          KEYCLOAK_REALM: ${{ secrets.KEYCLOAK_REALM }}
          KEYCLOAK_ADMIN_CLIENT_ID: ${{ secrets.KEYCLOAK_ADMIN_CLIENT_ID }}
          KEYCLOAK_ADMIN_CLIENT_SECRET: ${{ secrets.KEYCLOAK_ADMIN_CLIENT_SECRET }}
