version: 2

updates:
  # Root (turbo, typescript, prettier)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-tooling:
        patterns: ["turbo", "typescript", "prettier*", "@workspace/*"]

  # Control API
  - package-ecosystem: npm
    directory: /apps/control-api
    schedule:
      interval: weekly
      day: monday
    groups:
      control-api-deps:
        patterns: ["*"]
        exclude-patterns: ["@types/*"]
      control-api-types:
        patterns: ["@types/*"]

  # Tenant API
  - package-ecosystem: npm
    directory: /apps/tenant-api
    schedule:
      interval: weekly
      day: monday
    groups:
      tenant-api-deps:
        patterns: ["*"]
        exclude-patterns: ["@types/*"]
      tenant-api-types:
        patterns: ["@types/*"]

  # Web
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    groups:
      web-deps:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
