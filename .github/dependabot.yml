version: 2

updates:
  # Root (turbo, typescript, prettier)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-tooling:
        patterns: ["turbo", "typescript", "prettier*", "@workspace/*"]

  # API
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    groups:
      api-deps:
        patterns: ["*"]
        exclude-patterns: ["@types/*"]
      api-types:
        patterns: ["@types/*"]

  # Web
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    groups:
      web-deps:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
