apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "archispark.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archispark.labels" . | nindent 4 }}
    app: archispark-web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: archispark-web
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: archispark-web
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image }}:{{ include "archispark.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.web.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            # Vide intentionnellement : le frontend appelle /api via l'Ingress
            - name: ARCHIMATE_API_URL
              value: ""
            - name: KEYCLOAK_URL
              value: {{ .Values.keycloak.url | required "keycloak.url is required" | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm | required "keycloak.realm is required" | quote }}
            - name: KEYCLOAK_CLIENT_ID_WEB
              value: {{ .Values.keycloak.clientIdWeb | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "archispark.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archispark.labels" . | nindent 4 }}
    app: archispark-web
spec:
  selector:
    app: archispark-web
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.web.port }}
      targetPort: http
