apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "archispark.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archispark.labels" . | nindent 4 }}
    app: archispark-postgres
spec:
  serviceName: {{ include "archispark.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: archispark-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: archispark-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: archispark
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "archispark.secretName" . }}
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: archispark
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "archispark", "-d", "archispark"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "archispark", "-d", "archispark"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storageClass }}
        storageClassName: {{ .Values.postgres.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "archispark.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archispark.labels" . | nindent 4 }}
    app: archispark-postgres
spec:
  selector:
    app: archispark-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  clusterIP: None
