{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "archispark.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archispark.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD:          {{ .Values.secrets.dbPassword | required "secrets.dbPassword is required" | quote }}
  KEYCLOAK_ADMIN_CLIENT_SECRET: {{ .Values.secrets.keycloakAdminClientSecret | required "secrets.keycloakAdminClientSecret is required" | quote }}
{{- if .Values.smtp.host }}
  SMTP_PASSWORD:        {{ .Values.secrets.smtpPassword | quote }}
{{- end }}
{{- end }}
