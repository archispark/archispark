apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "archispark.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archispark.labels" . | nindent 4 }}
    app: archispark-mcp
spec:
  replicas: {{ .Values.mcpServer.replicas }}
  selector:
    matchLabels:
      app: archispark-mcp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: archispark-mcp
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp-server
          image: "{{ .Values.mcpServer.image }}:{{ include "archispark.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcpServer.port }}
          env:
            - name: NODE_ENV
              value: production
            - name: MCP_PORT
              value: {{ .Values.mcpServer.port | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "archispark.secretName" . }}
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://archispark:$(DB_PASSWORD)@{{ include "archispark.fullname" . }}-postgres:5432/archispark?sslmode=disable"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "archispark.secretName" . }}
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: {{ include "archispark.redisUrl" . | quote }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.mcpServer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "archispark.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archispark.labels" . | nindent 4 }}
    app: archispark-mcp
spec:
  selector:
    app: archispark-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.mcpServer.port }}
      targetPort: http
