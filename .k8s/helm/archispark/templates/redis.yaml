apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "archispark.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archispark.labels" . | nindent 4 }}
    app: archispark-redis
spec:
  serviceName: {{ include "archispark.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      app: archispark-redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: archispark-redis
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          command:
            - redis-server
            - --appendonly
            - "yes"
            {{- if .Values.secrets.redisPassword }}
            - --requirepass
            - $(REDIS_PASSWORD)
            {{- end }}
          {{- if .Values.secrets.redisPassword }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "archispark.secretName" . }}
                  key: REDIS_PASSWORD
          {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                {{- if .Values.secrets.redisPassword }}
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
                {{- else }}
                - redis-cli ping | grep -q PONG
                {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                {{- if .Values.secrets.redisPassword }}
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
                {{- else }}
                - redis-cli ping | grep -q PONG
                {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.storageClass }}
        storageClassName: {{ .Values.redis.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "archispark.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archispark.labels" . | nindent 4 }}
    app: archispark-redis
spec:
  selector:
    app: archispark-redis
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  clusterIP: None
