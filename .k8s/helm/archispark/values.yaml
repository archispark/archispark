# ─────────────────────────────────────────────────────────────────────────────
#  ArchiSpark — Helm values
#
#  Usage minimal :
#    helm install archispark .k8s/helm/archispark \
#      --set ingress.host=archispark.example.com \
#      --set secrets.dbPassword=<motdepasse>
#
#  Voir NOTES.txt après l'installation pour les instructions de démarrage.
# ─────────────────────────────────────────────────────────────────────────────

# ── Images ───────────────────────────────────────────────────────────────────
# Variante OS : alpine (défaut, plus légère) ou trixie-slim (Debian)
image:
  os: alpine
  # Version des images Docker Hub archispark/*
  # Utilisez un tag précis en production (ex: alpine-0.4.0)
  tag: latest
  pullPolicy: IfNotPresent
  # pullSecrets: []

# ── Keycloak (self-hosted, deployed separately from this chart) ────────────────
# ArchiSpark authenticates against a Keycloak instance that this chart does
# NOT provision — see docs/deployment.md#onboarding-dun-nouveau-client-un-realm-keycloak-dédié.
# All four values below are required for login to work (api and web both
# read them at runtime); the admin client secret goes in secrets.keycloakAdminClientSecret.
keycloak:
  url: ""             # Requis — ex. https://keycloak.example.com
  realm: ""           # Requis — ex. archispark ou archispark-<tenant>
  clientIdWeb: archispark-web
  adminClientId: archispark-api

# ── API (Express) ─────────────────────────────────────────────────────────────
api:
  image: archispark/archispark-api
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── MCP Server ────────────────────────────────────────────────────────────────
mcpServer:
  image: archispark/archispark-mcp-server
  replicas: 1
  port: 3001
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# ── Web (Next.js) ─────────────────────────────────────────────────────────────
web:
  image: archispark/archispark-web
  replicas: 1
  port: 8000
  # NEXT_PUBLIC_MCP_SERVER_URL est inlinée au build — modifiez l'image si besoin.
  # mcpServerUrl: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres:
  image: postgres:17-alpine
  storage: 5Gi
  # storageClass: "" # vide = classe par défaut du cluster
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Invitations par e-mail ───────────────────────────────────────────────────
# URL publique du déploiement — utilisée pour construire le lien d'invitation
# (${archisparkUrl}/invitations/<token>), jamais reconstruite depuis l'en-tête
# Host de la requête. Laisser vide désactive la construction du lien (l'API
# refuse alors l'envoi — voir docs/authentication.md#organization-invitations-by-e-mail).
archisparkUrl: ""

# SMTP utilisé par l'API pour l'e-mail "vous êtes invité". Laisser smtp.host
# vide désactive l'envoi (l'invitation reste créée avec sent_at=null,
# à renvoyer une fois le SMTP configuré) — voir secrets.smtpPassword ci-dessous
# pour le mot de passe.
smtp:
  host: ""
  port: 587
  user: ""
  from: "no-reply@archispark.local"

# ── Ingress (NGINX Ingress Controller) ───────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: archispark.example.com
  tls:
    enabled: false
    # secretName: archispark-tls  # Secret TLS à créer manuellement ou via cert-manager
  annotations: {}

# ── Secrets ───────────────────────────────────────────────────────────────────
# En production, préférez un gestionnaire de secrets externe
# (Sealed Secrets, External Secrets Operator, Vault…) et pointez
# existingSecret vers le nom du Secret K8s existant.
secrets:
  # Nom d'un Secret K8s existant (laissez vide pour que le chart le crée)
  existingSecret: ""
  # Clés attendues dans le Secret (ou valeurs inline si existingSecret est vide)
  dbPassword: ""         # Requis — mot de passe PostgreSQL
  keycloakAdminClientSecret: ""  # Requis — secret du client confidentiel keycloak.adminClientId
  smtpPassword: ""       # Optionnel — requis seulement si smtp.host est défini
