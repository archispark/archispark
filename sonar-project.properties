# Exclure tous les fichiers d'un certain type dans tout le projet
# packages/db/seeds/demo.sql est généré automatiquement par
# apps/api/scripts/generate-demo-seed.ts à partir de data/*.xml : les
# littéraux dupliqués y sont inhérents aux données importées.
sonar.exclusions=apps/web/messages/*.json,packages/db/seeds/demo.sql
